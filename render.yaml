# Render Blueprint: https://render.com/docs/blueprint-spec
# Connect repo → New Blueprint → select this file, then set secrets (NEON_DATABASE_URL, JWT_SECRET, etc.)

services:
  - type: web
    name: workoutos
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
