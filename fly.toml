# Rename the app, then: fly launch (or fly apps create) && fly deploy
# https://fly.io/docs/languages-and-frameworks/node/

app = "workoutos-replace-me"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
